name: Check Updates

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PRs created)"
        type: boolean
        default: false
      package:
        description: "Specific package to check (e.g., net-im/goofcord)"
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GIT_TERMINAL_PROMPT: "0"

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      results_json: ${{ steps.check.outputs.results }}
      updates_json: ${{ steps.check.outputs.updates }}
      has_updates: ${{ steps.check.outputs.has_updates }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Check for updates
        id: check
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail

          ARGS=""
          if [ -n "$PACKAGE" ]; then
            ARGS="--package $PACKAGE"
          fi

          set +e
          .agents/skills/overlay-tools/bin/check-updates $ARGS --json > updates.json
          status=$?
          set -e

          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            echo "::error::check-updates failed with exit code $status"
            exit "$status"
          fi

          echo "Updates found:"
          cat updates.json | jq -r '.[] | select(.status=="update-available") | "\(.category)/\(.name): \(.current_version) -> \(.latest_version)"'

          HAS_UPDATES=$(jq 'any(.[]; .status=="update-available")' updates.json)
          echo "has_updates=$HAS_UPDATES" >> "$GITHUB_OUTPUT"

          RESULTS=$(cat updates.json | jq -c '.')
          echo "results=$RESULTS" >> "$GITHUB_OUTPUT"

          UPDATES=$(cat updates.json | jq -c '[.[] | select(.status=="update-available")]')
          echo "updates=$UPDATES" >> "$GITHUB_OUTPUT"

      - name: Upload updates artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: updates
          path: updates.json

  create-prs:
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
      options: --user root
    env:
      PORTAGE_BINHOST: "https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/"
      EMERGE_DEFAULT_OPTS: "--getbinpkg=y --usepkg=y --binpkg-respect-use=y"
      UPDATES_JSON: ${{ needs.check-updates.outputs.updates_json }}

    steps:
      - name: Install dependencies
        run: |
          emerge-webrsync
          export FEATURES="${FEATURES:-} binpkg-ignore-signature"
          emerge --quiet --noreplace dev-vcs/git app-misc/ca-certificates net-misc/curl app-misc/jq
          emerge --info | grep -E "(BINHOST|EMERGE_DEFAULT_OPTS|FEATURES)" || true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Configure Portage repositories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p /etc/portage/repos.conf
          cat > /etc/portage/repos.conf/zzz-turbo-overlay.conf <<EOF
          [DEFAULT]
          main-repo = gentoo

          [gentoo]
          location = /var/db/repos/gentoo

          [turbo-overlay]
          location = ${GITHUB_WORKSPACE}
          masters = gentoo
          auto-sync = no
          EOF

          cat /etc/portage/repos.conf/zzz-turbo-overlay.conf

      - name: Validate Portage repositories
        shell: bash
        run: |
          set -euo pipefail

          test -d /var/db/repos/gentoo || {
            echo "ERROR: /var/db/repos/gentoo was not created by emerge-webrsync"
            exit 1
          }

          GENTOO_PATH="$(portageq get_repo_path / gentoo)"
          OVERLAY_PATH="$(portageq get_repo_path / turbo-overlay)"

          test "${GENTOO_PATH}" = "/var/db/repos/gentoo" || {
            echo "ERROR: gentoo repo path mismatch: ${GENTOO_PATH}"
            exit 1
          }

          test "${OVERLAY_PATH}" = "${GITHUB_WORKSPACE}" || {
            echo "ERROR: turbo-overlay repo path mismatch: ${OVERLAY_PATH}"
            exit 1
          }

      - name: Trust workspace for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --get-all safe.directory

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Install gh
        env:
          GH_VERSION: "2.45.0"
        run: |
          curl -fsSL -o /tmp/gh.tar.gz "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz"
          tar -C /tmp -xzf /tmp/gh.tar.gz
          install -m 0755 "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" /usr/local/bin/gh

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify git is available
        run: |
          which git || (echo "ERROR: git not found in PATH" && exit 1)
          git --version
          git rev-parse --is-inside-work-tree || (echo "ERROR: not in a git repository" && exit 1)

      - name: Create PRs
        shell: bash
        run: |
          set -euo pipefail

          updates_file="$(mktemp)"
          printf '%s\n' "${UPDATES_JSON}" > "${updates_file}"

          failures=0

          while IFS= read -r update; do
            CATEGORY="$(jq -r '.category' <<<"${update}")"
            NAME="$(jq -r '.name' <<<"${update}")"
            VERSION="$(jq -r '.gentoo_version // empty' <<<"${update}")"
            MY_PV="$(jq -r '.my_pv // empty' <<<"${update}")"
            UPSTREAM_VERSION="$(jq -r '.latest_version // empty' <<<"${update}")"
            UPSTREAM_URL="$(jq -r '.latest_url // empty' <<<"${update}")"
            ATOM="${CATEGORY}/${NAME}"

            ARGS=("--pr" "--base" "master" "--version" "${VERSION}")

            if [[ -n "${MY_PV}" ]]; then
              ARGS+=("--my-pv" "${UPSTREAM_VERSION}")
            fi

            if [[ -n "${UPSTREAM_URL}" ]]; then
              ARGS+=("--upstream-url" "${UPSTREAM_URL}")
            fi

            echo "Processing ${ATOM} -> ${VERSION}"
            echo "Running: update-ebuild ${ARGS[*]} ${ATOM}"

            git checkout -B master origin/master
            git reset --hard origin/master
            git clean -fd

            if ! .agents/skills/overlay-tools/bin/update-ebuild "${ARGS[@]}" "${ATOM}"; then
              echo "::error::Failed to create PR for ${ATOM} - check logs above for details"
              failures=$((failures + 1))
            fi
          done < <(jq -c '.[]' "${updates_file}")

          rm -f "${updates_file}"

          if [[ "${failures}" -gt 0 ]]; then
            echo "::error::${failures} package update(s) failed"
            exit 1
          fi

  summary:
    needs: [check-updates, create-prs]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Summary
        env:
          HAS_UPDATES: ${{ needs.check-updates.outputs.has_updates }}
          DRY_RUN: ${{ inputs.dry_run }}
          UPDATES_JSON: ${{ needs.check-updates.outputs.updates_json }}
          RESULTS_JSON: ${{ needs.check-updates.outputs.results_json }}
        run: |
          set -euo pipefail

          HAS_UPDATES="${HAS_UPDATES:-false}"
          DRY_RUN="${DRY_RUN:-false}"
          UPDATES_JSON="${UPDATES_JSON:-[]}"
          RESULTS_JSON="${RESULTS_JSON:-[]}"

          {
            cat <<EOF
          ## Update Check Summary

          EOF

            if [ "$HAS_UPDATES" = "true" ]; then
              if [ "$DRY_RUN" = "true" ]; then
                cat <<EOF
          Updates were found but this was a dry run; PRs were not created.

          ### Available Updates

          | Package | Current | Latest | Upstream |
          | --- | --- | --- | --- |
          EOF
              else
                cat <<EOF
          Updates were found and PRs were created (or already exist).

          ### Available Updates

          | Package | Current | Latest | Upstream |
          | --- | --- | --- | --- |
          EOF
              fi

              jq -r '.[] | "| \(.category)/\(.name) | `\(.current_version)` | `\(.latest_version)` | " + (if .latest_url then "[release](\(.latest_url))" else "-" end) + " |"' <<<"$UPDATES_JSON"
            else
              cat <<EOF
          No updates available. All packages are up to date.
          EOF
            fi

            manual_count=$(jq '[.[] | select(.status=="manual-check")] | length' <<<"$RESULTS_JSON")
            if [ "$manual_count" -gt 0 ]; then
              cat <<EOF

          ### Manual Checks

          | Package | Current | Check |
          | --- | --- | --- |
          EOF
              jq -r '.[] | select(.status=="manual-check") | "| \(.category)/\(.name) | `\(.current_version)` | " + (if .custom_url then "[link](\(.custom_url))" else "-" end) + " |"' <<<"$RESULTS_JSON"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
